    <!-- Suppress persistent cookie consent banners before React loads.
         The opt-out modal is allowed through; CCPA compliance is via Privacy Policy page. -->
    <style>
      /* Pre-React: hide Consently banner bar but allow the opt-out modal to work */
      #cc-main:not(.cc--visible), .cc-revoke,
      .fc-ab-root, [id^="google_fc_"], #googlefc-wrapper,
      .googlefc-dialog-content, #googlefc-consent-dialog {

        pointer-events: none !important;

      }
    </style>

    <!-- Google Funding Choices removed — caused duplicate "Do Not Sell" banner alongside Consently -->
    <!-- Capture PWA install prompt as early as possible (before React loads) -->
    <script>
      window.__pwaInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__pwaInstallPrompt = e;
        window.dispatchEvent(new Event('pwaInstallReady'));
      });
      window.addEventListener('appinstalled', function() {
        window.__pwaInstalled = true;
        window.__pwaInstallPrompt = null;
        window.dispatchEvent(new Event('pwaInstalled'));
      });
    </script>
